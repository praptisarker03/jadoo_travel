<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Jadoo Travel</title>
    <meta name="description" content="Sign in to your Jadoo account.">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

   
    <header style="background-color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <div class="container nav-container">
            <div class="logo">Jadoo</div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="destinations.html">Destinations</a>
                <a href="hotels.html">Hotels</a>
                <a href="login.html" class="btn-login">Login</a>
                <a href="login.html" class="btn-signup">Sign Up</a>
            </nav>
        </div>
    </header>

    
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-image"></div>
            <div class="auth-form-wrap">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Please enter your details to sign in.</p>
                
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-block" style="border: none; cursor: pointer;">Sign In</button>
                    
                    <div class="auth-links">
                        <p>Don't have an account? <a href="#">Sign up for free</a></p>
                    </div>
                </form>
            </div>
        </div>
    </section>


    <footer>
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>All rights reserved @jadoo.co</p>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
